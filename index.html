<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://telegram.org/js/telegram-web-app.js?2"></script>
    <script>
        function setThemeClass() {
            document.documentElement.className = Telegram.WebApp.colorScheme;
        }
        Telegram.WebApp.onEvent('themeChanged', setThemeClass);
        setThemeClass();
    </script>
    <title>Tmwelx Store</title>
    <style>
        body {
            --bg-color: var(--tg-theme-bg-color, #fff);
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--tg-theme-text-color, #222);
            margin: 0; padding: 0;
            color-scheme: var(--tg-color-scheme);
        }
        .container { padding: 20px; text-align: center; }
        .service-card {
            background-color: var(--tg-theme-secondary-bg-color, #efefef);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 18px;
            margin: 12px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .service-card.selected { 
            border-color: var(--tg-theme-button-color, #50a8eb);
            transform: scale(1.02);
        }
        .price-tag { color: #28a745; font-weight: bold; font-size: 1.1em; }
        .service-info { text-align: right; }
        h2 { margin-bottom: 5px; color: var(--tg-theme-button-color); }
        .hint { color: var(--tg-theme-hint-color); font-size: 0.9em; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>💎 متجر Tmwelx</h2>
    <p class="hint">اختر الخدمة المطلوبة واضغط على الزر الأزرق بالأسفل</p>

    <div id="services">
        <div class="service-card" onclick="selectTmwelx('1000 مشترك عربي', 500, this)">
            <span class="price-tag">500 Star</span>
            <div class="service-info">
                <b>🚀 تمويل 1000 مشترك</b>
            </div>
        </div>
        <div class="service-card" onclick="selectTmwelx('5000 مشترك حقيقي', 2000, this)">
            <span class="price-tag">2000 Star</span>
            <div class="service-info">
                <b>🔥 تمويل 5000 مشترك</b>
            </div>
        </div>
        <div class="service-card" onclick="selectTmwelx('تصميم لوجو احترافي', 300, this)">
            <span class="price-tag">300 Star</span>
            <div class="service-info">
                <b>🎨 تصميم شعار (Logo)</b>
            </div>
        </div>
    </div>
</div>

<script type="application/javascript">
    const tg = Telegram.WebApp;
    tg.ready();
    tg.expand();

    let selectedService = "";
    let selectedPrice = 0;

    function selectTmwelx(name, price, el) {
        document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        
        selectedService = name;
        selectedPrice = price;

        tg.MainButton.setText("شراء " + name + " بـ " + price + " نجمة");
        tg.MainButton.show();
        tg.HapticFeedback.impactOccurred('heavy');
    }

    tg.MainButton.onClick(function() {
        const orderData = {
            service: selectedService,
            price: selectedPrice
        };
        // إرسال البيانات كـ JSON
        tg.sendData(JSON.stringify(orderData)); 
        tg.close();
    });
</script>
</body>
</html>
