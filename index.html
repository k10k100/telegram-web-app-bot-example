<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://telegram.org/js/telegram-web-app.js?2"></script>
    <script>
        function setThemeClass() {
            document.documentElement.className = Telegram.WebApp.colorScheme;
        }
        Telegram.WebApp.onEvent('themeChanged', setThemeClass);
        setThemeClass();
    </script>
    <title>Tmwelx Store</title>
    <style>
        /* ستايل تليجرام الأصلي بالكامل */
        body {
            --bg-color: var(--tg-theme-bg-color, #fff);
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--tg-theme-text-color, #222);
            font-size: 14px; margin: 0; padding: 0;
            color-scheme: var(--tg-color-scheme);
        }
        section { padding: 15px; text-align: center; background-color: var(--bg-color, #ffffff); }
        section#top_sect { background-color: var(--tg-theme-bg-color, #ffffff); border-bottom: 1px solid #ccc; }
        
        /* ستايل خدمات Tmwelx (إضافتي لك) */
        .service-card {
            background-color: var(--tg-theme-secondary-bg-color, #efefef);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            text-align: right;
        }
        .service-card.selected { border-color: var(--tg-theme-button-color, #50a8eb); }
        .price-tag { color: #28a745; font-weight: bold; float: left; }
    </style>
</head>

<body class="" style="visibility: hidden;">

<section id="top_sect">
    <h2 style="margin-top:0;">💎 متجر Tmwelx</h2>
    <p>اختر الخدمة المطلوبة واضغط على الزر الأزرق بالأسفل</p>

    <div id="services">
        <div class="service-card" onclick="selectTmwelx('1000 مشترك عربي', '500 Star', this)">
            <span class="price-tag">500 Star</span>
            <b>🚀 تمويل 1000 مشترك</b>
        </div>
        <div class="service-card" onclick="selectTmwelx('5000 مشترك حقيقي', '2000 Star', this)">
            <span class="price-tag">2000 Star</span>
            <b>🔥 تمويل 5000 مشترك</b>
        </div>
        <div class="service-card" onclick="selectTmwelx('تصميم لوجو احترافي', '300 Star', this)">
            <span class="price-tag">300 Star</span>
            <b>🎨 تصميم شعار (Logo)</b>
        </div>
    </div>
</section>

<section>
    <button onclick="Telegram.WebApp.expand();">توسيع الشاشة (Expand)</button>
    <div class="hint">هذه المنطقة تحتوي على أدوات المطور الأصلية</div>
    <pre><code id="webview_data"></code></pre>
</section>

<script type="application/javascript">
    const tg = Telegram.WebApp;
    
    // وظيفة الاختيار الخاصة بـ Tmwelx
    function selectTmwelx(name, price, el) {
        document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        
        tg.MainButton.setText("تأكيد طلب " + name);
        tg.MainButton.show();
        tg.HapticFeedback.impactOccurred('medium');
    }

    // تهيئة التطبيق (كما في الكود الأصلي)
    tg.ready();
    tg.MainButton.onClick(function() {
        tg.sendData(tg.MainButton.text);
        tg.close();
    });

    // لعرض بيانات التليجرام (للتحقق من العمل)
    document.getElementById('webview_data').textContent = JSON.stringify(tg.initDataUnsafe, null, 2);
    document.body.style.visibility = '';
</script>
</body>
</html>
